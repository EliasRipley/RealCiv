name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle (retry once on transient repository errors)
        shell: bash
        run: |
          ./gradlew build --stacktrace || {
            echo "Initial Gradle build failed; retrying once after a short backoff."
            sleep 20
            ./gradlew build --stacktrace
          }
